name: Feature Request
description: Suggest an idea or new feature
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please provide your idea below.

  - type: input
    id: title
    attributes:
      label: Feature Title
      description: Brief title for the feature
      placeholder: "[e.g., Dark Mode Support]"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the feature you'd like to see
      placeholder: What would this feature do? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: Describe the problem or pain point this addresses
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this feature to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, examples, or code snippets

  - type: dropdown
    id: component
    attributes:
      label: Component(s) Affected
      description: Which component(s) would this affect?
      multiple: true
      options:
        - Desktop App
        - Mobile App
        - Web Platform
        - API
        - Database
        - Authentication
        - Documentation
        - Other

  - type: checkboxes
    id: terms
    attributes:
      label: Acknowledgments
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I will follow the Code of Conduct
          required: true
