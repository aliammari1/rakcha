name: Bug Report
description: Report a bug or issue you've encountered
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below to help us understand and fix the issue.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component has the issue?
      options:
        - Desktop App
        - Mobile App
        - Web Platform
        - API
        - Database
        - Authentication
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you using? (e.g., v2.0.0)
      placeholder: v2.0.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
      placeholder: What is the bug? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your environment details
      placeholder: |
        - OS: Windows 10 / macOS / Linux
        - Browser: Chrome 120
        - Java Version: 21
        - Flutter Version: 3.x
      value: |
        - OS: 
        - Browser: 
        - Java Version: 

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots/Videos
      description: If applicable, add screenshots or videos showing the issue

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any error messages or stack traces
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might be helpful?

  - type: checkboxes
    id: terms
    attributes:
      label: Acknowledgments
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have read the documentation
          required: true
        - label: I will follow the Code of Conduct
          required: true
