openapi: 3.0.3
info:
  title: Rakcha API
  version: 1.0.0
  description: Unified API for Rakcha cinema management platform
paths:
  /api/cinemas:
    get:
      summary: List all cinemas
      responses:
        '200':
          description: A list of cinemas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cinema'
  /api/films:
    get:
      summary: List all films
      responses:
        '200':
          description: A list of films
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Film'
  /api/series:
    get:
      summary: List all series
      responses:
        '200':
          description: A list of series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Series'
  /api/products:
    get:
      summary: List all products
      responses:
        '200':
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
  /api/users/auth:
    post:
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
components:
  schemas:
    Cinema:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        status:
          type: string
          enum: [open, closed, renovation]
    Film:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        duration:
          type: integer
        category:
          type: string
    Series:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        seasons:
          type: integer
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
          format: float
        category:
          type: string
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [client, admin, cinema_manager]